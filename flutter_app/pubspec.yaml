name: id_mgmt
description: School ID Management System — Multi-tenant, hierarchical
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation (with base path /idmgmt support)
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  google_sign_in: ^6.2.1
  firebase_storage: ^12.1.3

  # Networking
  dio: ^5.4.3+1
  http: ^1.2.1

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0
  data_table_2: 2.5.14
  flutter_staggered_grid_view: ^0.7.0
  timeline_tile: ^2.0.0
  step_progress_indicator: ^1.0.2
  badges: ^3.1.2
  flutter_svg: ^2.0.10+1
  animated_text_kit: ^4.2.2
  auto_size_text: ^3.0.0

  # File Handling
  file_picker: ^8.0.3+1
  image_picker: ^1.1.2
  excel: ^4.0.2
  pdf: ^3.11.0
  printing: ^5.12.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # Forms
  reactive_forms: ^17.0.0
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^10.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.1
  connectivity_plus: ^6.0.3
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  timeago: ^3.6.1
  qr_flutter: ^4.1.0
  dotted_border: ^2.1.0
  flutter_colorpicker: ^1.1.0
  percent_indicator: ^4.2.3
  responsive_framework: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
