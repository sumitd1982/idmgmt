server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve Flutter SPA at /idmgmt
    location /idmgmt/ {
        alias /usr/share/nginx/html/idmgmt/;
        try_files $uri $uri/ /idmgmt/index.html;

        # Cache images and fonts aggressively, but NOT javascript.
        # Flutter's service worker and main.dart.js MUST bypass cache to trigger updates.
        location ~* \.(css|woff2|png|jpg|jpeg|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for Service Workers or Entrypoints
        location ~* (index\.html|flutter_service_worker\.js|flutter_bootstrap\.js|main\.dart\.js)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Redirect bare /idmgmt to /idmgmt/
    location = /idmgmt {
        return 301 /idmgmt/;
    }

    # Health check
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
