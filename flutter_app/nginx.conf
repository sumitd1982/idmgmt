server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve Flutter SPA at /idmgmt
    location /idmgmt/ {
        alias /usr/share/nginx/html/idmgmt/;
        try_files $uri $uri/ /idmgmt/index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|woff2|png|jpg|jpeg|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for index.html
        location = /idmgmt/index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Redirect bare /idmgmt to /idmgmt/
    location = /idmgmt {
        return 301 /idmgmt/;
    }

    # Health check
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
